name: Build AppImage

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller appimage-builder
    
    - name: Build with PyInstaller
      run: |
        cd cod
        pyinstaller --name "PDFTool" \
          --windowed --onefile \
          --add-data "tabs:tabs" \
          --add-data "utils:utils" \
          --add-data "pdf_tool.py:." \
          --add-data "pdf_icon.png:." \
          --hidden-import PySide6 \
          --hidden-import PIL \
          --hidden-import pypdf \
          --hidden-import PyPDFForm \
          main.py
        cd ..
    
    - name: Build AppImage
      run: |
        appimage-builder --recipe AppImageBuilder.yml
        # Якщо appimage-builder не створив файл
        if [ ! -f *.AppImage ]; then
          wget -c "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x appimagetool-x86_64.AppImage
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir PDFTool-x86_64.AppImage
        fi
    
    - name: Upload AppImage
      uses: actions/upload-artifact@v3
      with:
        name: PDFTool-AppImage
        path: *.AppImage
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          *.AppImage
        generate_release_notes: true
